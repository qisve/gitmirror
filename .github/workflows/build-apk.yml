name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npx vite build

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Copy native plugin files
        run: |
          cp -f android-src/TermuxBridge.java \
            android/app/src/main/java/com/gitmirror/app/
          cp -f android-src/MainActivity.java \
            android/app/src/main/java/com/gitmirror/app/

      - name: Patch AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i '/<uses-permission.*INTERNET/a\
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>\n\
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>\n\
          <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" \/>\n\
          <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" \/>\n\
          <uses-permission android:name="android.permission.POST_NOTIFICATIONS" \/>\n\
          <uses-permission android:name="com.termux.permission.RUN_COMMAND" \/>' \
            "$MANIFEST"
          sed -i '/<application/a\    android:requestLegacyExternalStorage="true"' \
            "$MANIFEST"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate keystore and patch signing
        run: |
          keytool -genkeypair -v \
            -keystore android/app/debug.keystore \
            -alias debug -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=GitMirror,OU=Dev,O=GitMirror,L=SH,ST=SH,C=CN"
          python3 - << 'PYEOF'
          import re
          f = "android/app/build.gradle"
          s = open(f).read()
          sig = '''
    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "debug"
            keyPassword "android"
        }
    }
'''
          if "signingConfigs" not in s:
              s = s.replace("    defaultConfig {", sig + "    defaultConfig {")
          if "signingConfig signingConfigs.debug" not in s:
              s = re.sub(r'(debug\s*\{)', r'\1\n                signingConfig signingConfigs.debug', s, count=1)
          open(f, "w").write(s)
          print("signing patched")
          PYEOF

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GitMirror-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
