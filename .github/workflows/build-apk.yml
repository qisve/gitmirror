name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npx vite build

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Copy native plugin files
        run: |
          cp -f android-src/TermuxBridge.java android/app/src/main/java/com/gitmirror/app/
          cp -f android-src/MainActivity.java android/app/src/main/java/com/gitmirror/app/

      - name: Patch AndroidManifest
        run: |
          M=android/app/src/main/AndroidManifest.xml
          sed -i '/<uses-permission.*INTERNET/a\
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\
          <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />\
          <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />\
          <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\
          <uses-permission android:name="com.termux.permission.RUN_COMMAND" />' "$M"
          sed -i '/<application/a\    android:requestLegacyExternalStorage="true"' "$M"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate keystore and patch signing
        run: |
          keytool -genkeypair -v \
            -keystore android/app/debug.keystore \
            -alias debug -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=GitMirror,OU=Dev,O=GitMirror,L=SH,ST=SH,C=CN"
          node -e "
            var fs=require('fs'),f='android/app/build.gradle',s=fs.readFileSync(f,'utf8');
            if(s.indexOf('signingConfigs')===-1){
              s=s.replace('    defaultConfig {','    signingConfigs {\n        debug {\n            storeFile file(\"debug.keystore\")\n            storePassword \"android\"\n            keyAlias \"debug\"\n            keyPassword \"android\"\n        }\n    }\n    defaultConfig {');
            }
            if(s.indexOf('signingConfig signingConfigs.debug')===-1){
              var i=s.indexOf('debug {',s.indexOf('buildTypes'));
              if(i>-1) s=s.slice(0,i+7)+'\n                signingConfig signingConfigs.debug'+s.slice(i+7);
            }
            fs.writeFileSync(f,s);
            console.log('signing patched');
          "

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GitMirror-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
